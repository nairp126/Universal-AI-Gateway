apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: universal-llm-gateway
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  PORT: "8000"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "llm_gateway"
  DB_USER: "postgres"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DEFAULT_MODEL: "gpt-4o"
  PROVIDER_TIMEOUT_SECONDS: "60"
  ENABLE_CACHE: "true"
  DEFAULT_REQUESTS_PER_MINUTE: "100"
  GLOBAL_REQUESTS_PER_SECOND: "5000"
  ENABLE_REQUEST_LOGGING: "true"
  LOG_PII_REDACTION: "true"
